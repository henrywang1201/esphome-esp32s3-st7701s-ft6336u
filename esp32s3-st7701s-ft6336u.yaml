esphome:
  name: esp32s3-st7701s-ft6336u
  friendly_name: esp32s3-st7701s-ft6336u
  platformio_options:
    board_build.flash_mode: qio
    board_build.f_flash: 80000000L
    build_flags:
      - "-DBOARD_HAS_PSRAM"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
      execute_from_psram: true
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 115200
  hardware_uart: UART0

api:
  encryption:
    key: "VmH04/B+Aa2q0a0m89ai8NyGAHeGSUSY69r5ImPxDfc="

ota:
  - platform: esphome
    password: "a15cb9d001271a46d81ac539b6ddb309"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esp32S3-St7701S-Ft6336U"
    password: "715346yn5cnq"

captive_portal:

spi:
  id: lcd_spi
  clk_pin: GPIO38
  mosi_pin: GPIO39
  interface: software

i2c:
  id: touch_i2c
  sda: GPIO5
  scl: GPIO4
  frequency: 400kHz
  scan: true

output:
  - platform: gpio
    id: lcd_backlight_gpio
    pin: GPIO13

light:
  - platform: binary
    id: lcd_backlight
    name: "LCD Backlight"
    output: lcd_backlight_gpio
    restore_mode: ALWAYS_ON

display:
  - platform: st7701s
    id: lcd_panel
    spi_id: lcd_spi
    cs_pin: GPIO45
    dimensions:
      width: 480
      height: 480
    color_order: RGB
    invert_colors: false
    pclk_frequency: 21MHz
    pclk_inverted: false
    hsync_pulse_width: 10
    hsync_back_porch: 10
    hsync_front_porch: 20
    vsync_pulse_width: 10
    vsync_back_porch: 10
    vsync_front_porch: 10
    de_pin: GPIO47
    pclk_pin: GPIO48
    hsync_pin: GPIO14
    vsync_pin: GPIO21
    data_pins:
      - GPIO0
      - GPIO12
      - GPIO11
      - GPIO10
      - GPIO9
      - GPIO46
      - GPIO3
      - GPIO20
      - GPIO19
      - GPIO8
      - GPIO18
      - GPIO17
      - GPIO16
      - GPIO15
      - GPIO7
      - GPIO6
    init_sequence:
      # Match Espressif's ST7701 RGB driver setup before the vendor init table.
      # The demo uses panel bits_per_pixel = 18, which maps to COLMOD 0x60.
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]
      - [0x36, 0x00]
      - [0x3A, 0x60]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x13]
      - [0xEF, 0x08]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xC0, 0x3B, 0x00]
      - [0xC1, 0x0B, 0x02]
      - [0xC2, 0x37, 0x02]
      - [0xCC, 0x10]
      - [0xB0, 0x00, 0x0F, 0x16, 0x0E, 0x11, 0x07, 0x09, 0x09, 0x08, 0x23, 0x05, 0x11, 0x0F, 0x28, 0x2D, 0x18]
      - [0xB1, 0x00, 0x0F, 0x16, 0x0E, 0x11, 0x07, 0x09, 0x08, 0x09, 0x23, 0x05, 0x11, 0x0F, 0x28, 0x2D, 0x18]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]
      - [0xB0, 0x4D]
      - [0xB1, 0x33]
      - [0xB2, 0x87]
      - [0xB5, 0x4B]
      - [0xB7, 0x8C]
      - [0xB8, 0x20]
      - [0xC1, 0x78]
      - [0xC2, 0x78]
      - [0xD0, 0x88]
      - [0xE0, 0x00, 0x00, 0x02]
      - [0xE1, 0x02, 0xF0, 0x00, 0x00, 0x03, 0xF0, 0x00, 0x00, 0x00, 0x44, 0x44]
      - [0xE2, 0x10, 0x10, 0x40, 0x40, 0xF2, 0xF0, 0x00, 0x00, 0xF2, 0xF0, 0x00, 0x00]
      - [0xE3, 0x00, 0x00, 0x11, 0x11]
      - [0xE4, 0x44, 0x44]
      - [0xE5, 0x07, 0xEF, 0xF0, 0xF0, 0x09, 0xF1, 0xF0, 0xF0, 0x03, 0xF3, 0xF0, 0xF0, 0x05, 0xED, 0xF0, 0xF0]
      - [0xE6, 0x00, 0x00, 0x11, 0x11]
      - [0xE7, 0x44, 0x44]
      - [0xE8, 0x08, 0xF0, 0xF0, 0xF0, 0x0A, 0xF2, 0xF0, 0xF0, 0x04, 0xF4, 0xF0, 0xF0, 0x06, 0xEE, 0xF0, 0xF0]
      - [0xEB, 0x00, 0x00, 0xE4, 0xE4, 0x44, 0x88, 0x40]
      - [0xEC, 0x78, 0x00]
      - [0xED, 0x20, 0xF9, 0x87, 0x76, 0x65, 0x54, 0x4F, 0xFF, 0xFF, 0xF4, 0x45, 0x56, 0x67, 0x78, 0x9F, 0x02]
      - [0xEF, 0x10, 0x0D, 0x04, 0x08, 0x3F, 0x1F]
      # Re-assert the normal command bank and RGB666 pixel format after vendor setup.
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]
      - [0x36, 0x00]
      - [0x3A, 0x60]

touchscreen:
  - platform: ft63x6
    id: touch_panel
    i2c_id: touch_i2c
    display: lcd_panel
    address: 0x38
    calibration:
      x_min: 0
      x_max: 480
      y_min: 0
      y_max: 480
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - logger.log:
          format: "Touch x=%d y=%d"
          args: [touch.x, touch.y]

globals:
  - id: ac_target_temp
    type: float
    restore_value: yes
    initial_value: "22.0"
  - id: ac_is_on
    type: bool
    restore_value: no
    initial_value: "true"

script:
  - id: show_mode_none
    then:
      - lambda: |-
          lv_obj_set_style_bg_color(id(mode_cool_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_heat_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_fan_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_dry_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_cool_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_heat_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_fan_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_dry_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
  - id: show_mode_cool
    then:
      - lambda: |-
          lv_obj_set_style_bg_color(id(mode_cool_button), lv_color_hex(0x1A73E8), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_heat_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_fan_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_dry_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_cool_label), lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_heat_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_fan_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_dry_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
  - id: show_mode_heat
    then:
      - lambda: |-
          lv_obj_set_style_bg_color(id(mode_cool_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_heat_button), lv_color_hex(0xE53935), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_fan_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_dry_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_cool_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_heat_label), lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_fan_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_dry_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
  - id: show_mode_fan
    then:
      - lambda: |-
          lv_obj_set_style_bg_color(id(mode_cool_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_heat_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_fan_button), lv_color_hex(0x34A853), LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(mode_dry_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_cool_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_heat_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_fan_label), lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(mode_dry_label), lv_color_hex(0x5F6368), LV_PART_MAIN);
  - id: show_mode_dry
    then:
