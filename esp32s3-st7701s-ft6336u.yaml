          lv_obj_set_style_text_color(id(mode_dry_label), lv_color_hex(0x202124), LV_PART_MAIN);

sensor:
  - platform: homeassistant
    id: ac_current_temperature
    entity_id: climate.lemesh_cn_2021901176_air02
    attribute: current_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: current_temp_label
          text:
            format: "CURRENT %.1fC"
            args: [x]

  - platform: homeassistant
    id: ac_target_temperature_ha
    entity_id: climate.lemesh_cn_2021901176_air02
    attribute: temperature
    internal: true
    on_value:
      - lambda: |-
          if (!isnan(x)) {
            id(ac_target_temp) = x;
          }
      - lvgl.label.update:
          id: target_temp_label
          text:
            format: "%.0f"
            args: [id(ac_target_temp)]

text_sensor:
  - platform: homeassistant
    id: ac_hvac_mode
    entity_id: climate.lemesh_cn_2021901176_air02
    internal: true
    on_value:
      - lambda: |-
          if (x == "cool") {
            id(ac_is_on) = true;
            lv_label_set_text(id(mode_status_label), "MODE COOL");
            id(show_mode_cool).execute();
          } else if (x == "heat") {
            id(ac_is_on) = true;
            lv_label_set_text(id(mode_status_label), "MODE HEAT");
            id(show_mode_heat).execute();
          } else if (x == "fan_only") {
            id(ac_is_on) = true;
            lv_label_set_text(id(mode_status_label), "MODE FAN");
            id(show_mode_fan).execute();
          } else if (x == "dry") {
            id(ac_is_on) = true;
            lv_label_set_text(id(mode_status_label), "MODE DRY");
            id(show_mode_dry).execute();
          } else if (x == "off") {
            id(ac_is_on) = false;
            lv_label_set_text(id(mode_status_label), "MODE OFF");
            id(show_mode_none).execute();
          } else {
            lv_label_set_text(id(mode_status_label), x.c_str());
            id(show_mode_none).execute();
          }
          if (id(ac_is_on)) {
            lv_label_set_text(id(power_label), "ON");
            lv_obj_set_style_bg_color(id(power_button), lv_color_hex(0x1A73E8), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(power_label), lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          } else {
            lv_label_set_text(id(power_label), "OFF");
            lv_obj_set_style_bg_color(id(power_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
            lv_obj_set_style_text_color(id(power_label), lv_color_hex(0x202124), LV_PART_MAIN);
          }

lvgl:
  displays:
    - lcd_panel
  touchscreens:
    - touch_panel
  buffer_size: 25%
  byte_order: little_endian
  rotation: 180
  resume_on_input: true
  on_idle:
    timeout: 20s
    then:
      - lvgl.pause:
          show_snow: false
  on_pause:
    then:
      - light.turn_off: lcd_backlight
  on_resume:
    then:
      - light.turn_on: lcd_backlight
  bg_color: 0xFFFFFF
  widgets:
    - obj:
        width: 100%
        height: 100%
        radius: 0
        pad_all: 0
        bg_color: 0xFFFFFF
        border_width: 0
        scrollbar_mode: "OFF"
        widgets:
          - label:
              text: "AC CONTROL"
              align: top_left
              x: 24
              y: 24
              text_font: montserrat_24
              text_color: 0x202124

          - label:
              id: mode_status_label
              text: "MODE --"
              align: top_right
              x: -24
              y: 28
              text_font: montserrat_14
              text_color: 0x5F6368

          - label:
              text: "TARGET"
              align: center
              y: -118
              text_font: montserrat_16
              text_color: 0x5F6368

          - label:
              id: target_temp_label
              text: "22"
              align: center
              y: -58
              text_font: montserrat_48
              text_color: 0x202124

          - label:
              text: "C"
              align: center
              x: 54
              y: -70
              text_font: montserrat_24
              text_color: 0x5F6368

          - label:
              id: current_temp_label
              text: "CURRENT --.-C"
              align: center
              y: -4
              text_font: montserrat_20
              text_color: 0x1A73E8

          - button:
              id: temp_down_button
              align: center
              x: -128
              y: 76
              width: 104
              height: 74
              radius: 8
              bg_color: 0xE8EAED
              border_width: 0
              on_click:
                - lambda: |-
                    id(ac_target_temp) -= 1.0f;
                    if (id(ac_target_temp) < 16.0f) {
                      id(ac_target_temp) = 16.0f;
                    }
                - lvgl.label.update:
                    id: target_temp_label
                    text:
                      format: "%.0f"
                      args: [id(ac_target_temp)]
                - homeassistant.service:
                    service: climate.set_temperature
                    data:
                      entity_id: climate.lemesh_cn_2021901176_air02
                      temperature: !lambda |-
                        char buffer[8];
                        snprintf(buffer, sizeof(buffer), "%.0f", id(ac_target_temp));
                        return std::string(buffer);
              widgets:
                - label:
                    text: "-"
                    align: center
                    text_font: montserrat_48
                    text_color: 0x202124

          - button:
              id: power_button
              align: center
              x: 0
              y: 76
              width: 104
              height: 74
              radius: 8
              bg_color: 0x1A73E8
              border_width: 0
              on_click:
                - homeassistant.service:
                    service: climate.set_hvac_mode
                    data:
                      entity_id: climate.lemesh_cn_2021901176_air02
                      hvac_mode: !lambda |-
                        return id(ac_is_on) ? std::string("off") : std::string("cool");
                - lambda: |-
                    id(ac_is_on) = !id(ac_is_on);
                    if (id(ac_is_on)) {
                      lv_label_set_text(id(power_label), "ON");
                      lv_label_set_text(id(mode_status_label), "MODE COOL");
                      id(show_mode_cool).execute();
                      lv_obj_set_style_bg_color(id(power_button), lv_color_hex(0x1A73E8), LV_PART_MAIN);
                      lv_obj_set_style_text_color(id(power_label), lv_color_hex(0xFFFFFF), LV_PART_MAIN);
                    } else {
                      lv_label_set_text(id(power_label), "OFF");
                      lv_label_set_text(id(mode_status_label), "MODE OFF");
                      id(show_mode_none).execute();
                      lv_obj_set_style_bg_color(id(power_button), lv_color_hex(0xE8EAED), LV_PART_MAIN);
                      lv_obj_set_style_text_color(id(power_label), lv_color_hex(0x202124), LV_PART_MAIN);
                    }
              widgets:
                - label:
                    id: power_label
                    text: "ON"
                    align: center
                    text_font: montserrat_20
                    text_color: 0xFFFFFF

          - button:
              id: temp_up_button
              align: center
              x: 128
              y: 76
              width: 104
              height: 74
              radius: 8
              bg_color: 0x1A73E8
              border_width: 0
              on_click:
                - lambda: |-
                    id(ac_target_temp) += 1.0f;
                    if (id(ac_target_temp) > 30.0f) {
                      id(ac_target_temp) = 30.0f;
                    }
                - lvgl.label.update:
                    id: target_temp_label
                    text:
                      format: "%.0f"
                      args: [id(ac_target_temp)]
                - homeassistant.service:
                    service: climate.set_temperature
                    data:
                      entity_id: climate.lemesh_cn_2021901176_air02
                      temperature: !lambda |-
                        char buffer[8];
                        snprintf(buffer, sizeof(buffer), "%.0f", id(ac_target_temp));
                        return std::string(buffer);
              widgets:
                - label:
                    text: "+"
                    align: center
                    text_font: montserrat_48
                    text_color: 0xFFFFFF

          - obj:
              id: mode_bar
              align: bottom_mid
              width: 100%
              height: 112
              radius: 0
              pad_all: 0
              bg_color: 0xF1F3F4
              border_width: 0
              scrollbar_mode: "OFF"
              widgets:
                - button:
                    id: mode_cool_button
                    align: left_mid
                    x: 14
                    width: 104
                    height: 70
                    radius: 8
                    bg_color: 0xE8EAED
                    border_width: 0
                    on_click:
                      - lvgl.label.update:
                          id: mode_status_label
                          text: "MODE COOL"
                      - script.execute: show_mode_cool
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: climate.lemesh_cn_2021901176_air02
                            hvac_mode: cool
                    widgets:
                      - label:
                          id: mode_cool_label
                          text: "COOL"
                          align: center
                          text_font: montserrat_16
                          text_color: 0x5F6368

                - button:
                    id: mode_heat_button
                    align: left_mid
                    x: 130
                    width: 104
                    height: 70
                    radius: 8
                    bg_color: 0xE8EAED
                    border_width: 0
                    on_click:
                      - lvgl.label.update:
                          id: mode_status_label
                          text: "MODE HEAT"
                      - script.execute: show_mode_heat
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: climate.lemesh_cn_2021901176_air02
                            hvac_mode: heat
                    widgets:
                      - label:
                          id: mode_heat_label
                          text: "HEAT"
                          align: center
                          text_font: montserrat_16
                          text_color: 0x5F6368

                - button:
                    id: mode_fan_button
                    align: left_mid
                    x: 246
                    width: 104
                    height: 70
                    radius: 8
                    bg_color: 0xE8EAED
                    border_width: 0
                    on_click:
                      - lvgl.label.update:
                          id: mode_status_label
                          text: "MODE FAN"
                      - script.execute: show_mode_fan
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: climate.lemesh_cn_2021901176_air02
                            hvac_mode: fan_only
                    widgets:
                      - label:
                          id: mode_fan_label
                          text: "FAN"
                          align: center
                          text_font: montserrat_16
                          text_color: 0x5F6368

                - button:
                    id: mode_dry_button
                    align: left_mid
                    x: 362
                    width: 104
                    height: 70
                    radius: 8
                    bg_color: 0xE8EAED
                    border_width: 0
                    on_click:
                      - lvgl.label.update:
                          id: mode_status_label
                          text: "MODE DRY"
                      - script.execute: show_mode_dry
                      - homeassistant.service:
                          service: climate.set_hvac_mode
                          data:
                            entity_id: climate.lemesh_cn_2021901176_air02
                            hvac_mode: dry
                    widgets:
                      - label:
                          id: mode_dry_label
                          text: "DRY"
                          align: center
                          text_font: montserrat_16
                          text_color: 0x5F6368
