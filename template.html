<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=480, height=480, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>HVAC Controller</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Sora -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#ff7a00",
                    "error-container": "#93000a",
                    "surface-variant": "#353534",
                    "on-secondary-fixed": "#001c38",
                    "tertiary-fixed-dim": "#53e16f",
                    "on-error": "#690005",
                    "on-tertiary-container": "#004114",
                    "surface-container-highest": "#353534",
                    "on-secondary-container": "#002b50",
                    "surface-container": "#201f1f",
                    "tertiary-fixed": "#72fe88",
                    "on-secondary-fixed-variant": "#004881",
                    "secondary": "#a2c9ff",
                    "secondary-container": "#0093fe",
                    "surface-bright": "#393939",
                    "surface-container-high": "#2a2a2a",
                    "on-primary-container": "#5c2800",
                    "on-tertiary-fixed": "#002107",
                    "on-error-container": "#ffdad6",
                    "tertiary-container": "#1cb84c",
                    "inverse-on-surface": "#313030",
                    "primary-fixed": "#ffdbc8",
                    "on-surface": "#e5e2e1",
                    "surface-container-lowest": "#0e0e0e",
                    "outline": "#a78b7c",
                    "background": "#131313",
                    "inverse-surface": "#e5e2e1",
                    "error": "#ffb4ab",
                    "on-primary-fixed": "#321200",
                    "on-primary": "#522300",
                    "primary": "#ffb68b",
                    "surface-container-low": "#1c1b1b",
                    "secondary-fixed-dim": "#a2c9ff",
                    "on-tertiary-fixed-variant": "#00531c",
                    "on-tertiary": "#003911",
                    "secondary-fixed": "#d3e4ff",
                    "surface": "#131313",
                    "on-surface-variant": "#e0c0af",
                    "inverse-primary": "#994700",
                    "on-primary-fixed-variant": "#753400",
                    "surface-tint": "#ffb68b",
                    "primary-fixed-dim": "#ffb68b",
                    "outline-variant": "#584235",
                    "surface-dim": "#131313",
                    "tertiary": "#53e16f",
                    "on-secondary": "#00315b",
                    "on-background": "#e5e2e1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gauge-inset": "40px",
                    "touch-target-min": "64px",
                    "safe-margin": "24px",
                    "stack-gap": "16px"
            },
            "fontFamily": {
                    "label-caps": [
                            "Sora"
                    ],
                    "mobile-temp": [
                            "Sora"
                    ],
                    "display-temp": [
                            "Sora"
                    ],
                    "body-lg": [
                            "Sora"
                    ],
                    "headline-md": [
                            "Sora"
                    ]
            },
            "fontSize": {
                    "label-caps": [
                            "14px",
                            {
                                    "lineHeight": "16px",
                                    "letterSpacing": "0.1em",
                                    "fontWeight": "700"
                            }
                    ],
                    "mobile-temp": [
                            "80px",
                            {
                                    "lineHeight": "80px",
                                    "fontWeight": "600"
                            }
                    ],
                    "display-temp": [
                            "120px",
                            {
                                    "lineHeight": "120px",
                                    "letterSpacing": "-0.04em",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-lg": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "fontWeight": "400"
                            }
                    ],
                    "headline-md": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "fontWeight": "600"
                            }
                    ]
            }
          },
        }
      }
    </script>
<style>
        body {
            width: 480px;
            height: 480px;
            overflow: hidden;
            background-color: #000000; /* Deep black foundation */
        }
        
        .gauge-svg {
            transform: rotate(-90deg); /* Start at top */
        }
        
        .gauge-track {
            fill: none;
            stroke: #1C1C1E; /* Level 1 Background */
            stroke-width: 12;
            stroke-linecap: round;
        }
        
        .gauge-progress {
            fill: none;
            stroke: #0093fe; /* Active state color - Cool Mode Blue */
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 816; /* Circumference of r=130 (2*pi*130) */
            stroke-dashoffset: 204; /* 75% fill */
            transition: stroke-dashoffset 0.5s ease;
        }

        .inner-shadow-pressed {
            box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.5), inset 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }
        
        .glass-overlay {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-on-surface flex flex-col relative select-none">
<!-- Top App Bar equivalent (Title / Info) -->
<header class="absolute top-0 left-0 w-full z-10 flex justify-between items-center px-safe-margin pt-safe-margin bg-transparent">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-label-caps text-label-caps" style="font-variation-settings: 'FILL' 1;">cloud</span>
<span class="font-label-caps text-label-caps tracking-widest text-primary">HOME CLIMATE</span>
</div>
<button aria-label="Settings" class="w-12 h-12 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-variant/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</header>
<!-- Main Canvas Area -->
<main class="flex-1 flex items-center justify-center relative w-full h-full mt-8">
<!-- Left Side: Minus Button -->
<div class="absolute left-safe-margin z-20 flex items-center h-full pt-8">
<button aria-label="Decrease Temperature" class="w-[72px] h-[72px] rounded-full bg-surface-container-high border border-white/10 flex items-center justify-center text-on-surface active:inner-shadow-pressed active:scale-95 transition-all">
<span class="material-symbols-outlined text-[40px]">remove</span>
</button>
</div>
<!-- Center: Circular Gauge -->
<div class="relative w-[300px] h-[300px] flex items-center justify-center z-10">
<!-- Background Glow for Active Mode -->
<div class="absolute inset-0 bg-secondary-container/20 rounded-full blur-[40px]"></div>
<!-- SVG Arc -->
<svg class="absolute inset-0 w-full h-full gauge-svg" viewbox="0 0 300 300">
<circle class="gauge-track" cx="150" cy="150" r="130"></circle>
<!-- Arc representing target temp range. Length controlled by stroke-dashoffset -->
<circle class="gauge-progress" cx="150" cy="150" r="130"></circle>
<!-- Thumb / Indicator dot -->
<!-- Positioning based on trig (for visual static purposes here) -->
<circle class="shadow-[0_0_15px_rgba(0,147,254,0.8)]" cx="150" cy="20" fill="#0093fe" r="10"></circle>
</svg>
<!-- Temperature Text Core -->
<div class="flex flex-col items-center justify-center relative z-20 text-center">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-1">TARGET</div>
<div class="font-display-temp text-display-temp text-on-surface leading-none tracking-tighter">
                    22<span class="text-headline-md font-headline-md text-on-surface-variant ml-1">°</span>
</div>
<div class="font-body-lg text-body-lg text-secondary mt-2 flex items-center gap-1">
                    CURRENT: 24°
                </div>
</div>
</div>
<!-- Right Side: Plus Button -->
<div class="absolute right-safe-margin z-20 flex items-center h-full pt-8">
<button aria-label="Increase Temperature" class="w-[72px] h-[72px] rounded-full bg-surface-container-high border border-white/10 flex items-center justify-center text-on-surface active:inner-shadow-pressed active:scale-95 transition-all">
<span class="material-symbols-outlined text-[40px]">add</span>
</button>
</div>
</main>
<!-- Bottom Mode Selector (Replaces BottomNavBar for specialized HVAC UI) -->
<nav class="absolute bottom-0 left-0 w-full z-20 px-safe-margin pb-safe-margin flex justify-around items-center h-touch-target-min glass-overlay rounded-t-[32px] border-t border-white/5 bg-surface-container/80">
<!-- Mode: Cool (Active) -->
<button aria-label="Cool Mode" class="flex flex-col items-center justify-center gap-1 w-[72px] group" data-active="true">
<div class="w-14 h-14 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center shadow-[inset_0_2px_4px_rgba(255,255,255,0.2),0_4px_12px_rgba(0,147,254,0.4)] transition-all">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">ac_unit</span>
</div>
<span class="font-label-caps text-label-caps text-secondary">制冷</span>
</button>
<!-- Mode: Heat -->
<button aria-label="Heat Mode" class="flex flex-col items-center justify-center gap-1 w-[72px] group">
<div class="w-14 h-14 rounded-full bg-transparent text-on-surface-variant border border-white/10 group-active:bg-surface-variant/30 flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-[32px]">wb_sunny</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">制热</span>
</button>
<!-- Mode: Dry -->
<button aria-label="Dry Mode" class="flex flex-col items-center justify-center gap-1 w-[72px] group">
<div class="w-14 h-14 rounded-full bg-transparent text-on-surface-variant border border-white/10 group-active:bg-surface-variant/30 flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-[32px]">water_drop</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">除湿</span>
</button>
<!-- Mode: Fan -->
<button aria-label="Fan Mode" class="flex flex-col items-center justify-center gap-1 w-[72px] group">
<div class="w-14 h-14 rounded-full bg-transparent text-on-surface-variant border border-white/10 group-active:bg-surface-variant/30 flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-[32px]">mode_fan</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">送风</span>
</button>
</nav>
</body></html>
